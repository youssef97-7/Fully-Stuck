<button id="settings-btn"><i class="fa-solid fa-gear"></i></button>

<div id="settingsModal" class="modal">
    <div class="modal-backdrop" data-settings-close></div>
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">Settings</h2>
            <button type="button" class="icon-btn" data-settings-close aria-label="Close settings modal">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="modal-body">
            <div>
                <label class="field-label" for="mainColor">Main Color</label>
                <input type="color" id="mainColor" class="field-input" value="#0f49bd" />
            </div>
            <div>
                <label class="field-label" for="fontFamily">Font Family</label>
                <select id="fontFamily" class="field-input">
                    <option value='"Segoe UI", Tahoma, Geneva, Verdana, sans-serif'>
                        Segoe UI
                    </option>
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="Helvetica, sans-serif">Helvetica</option>
                    <option value="Times New Roman, serif">Times New Roman</option>
                    <option value="Georgia, serif">Georgia</option>
                    <option value="Courier New, monospace">Courier New</option>
                </select>
            </div>
            <div>
                <label class="field-label" for="fontSize">Font Size</label>
                <input type="range" id="fontSize" class="field-input" min="12" max="24" value="16" />
                <span id="fontSizeValue">16px</span>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-secondary" data-settings-close>
                Cancel
            </button>
            <button type="button" class="btn-primary" id="saveSettings">Save</button>
        </div>
    </div>
</div>
