<!doctype html>
<html lang="en">
  {% load static %}
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up | Booooooook</title>
    <link rel="stylesheet" href="{% static 'css/all.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="stylesheet" href="{% static 'css/media.css' %}" />


  </head>
  <body id="signup-page" class="auth-body">
    <script>
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
      }
    </script>

    <nav class="auth-nav conteiner">
      <div class="nav-logo">
        <a href="{% url 'intro' %}">Fully stuck</a>
      </div>
      <div class="auth-nav-actions">
        <a href="{% url 'login' %}" class="auth-nav-link">Log in</a>
        <button type="button" id="theme-toggle" aria-label="Toggle theme">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </nav>

    <main class="auth-main auth-main--signup">
      <div class="auth-card auth-card--wide">
        <div class="auth-card-header">
          <h1 class="auth-title">Create account</h1>
          <p class="auth-subtitle">Join Booooooook in a few steps</p>
        </div>

        <form
          id="signupForm"
          method="POST"
          action="{% url 'signup' %}"
          class="auth-form"
        >
          {% csrf_token %}
          <div class="auth-grid">
            <div class="auth-field">
              <label class="auth-label" for="firstName">First name</label>
              <input
                class="auth-input"
                id="firstName"
                name="firstName"
                type="text"
                autocomplete="given-name"
                placeholder="First name"
                value="{{ first_name }}"
                required
              />
            </div>
            <div class="auth-field">
              <label class="auth-label" for="lastName">Last name</label>
              <input
                class="auth-input"
                id="lastName"
                name="lastName"
                type="text"
                autocomplete="family-name"
                placeholder="Last name"
                value="{{ last_name }}"
                required
              />
            </div>
          </div>

          <div class="auth-grid">
            <div class="auth-field">
              <label class="auth-label" for="email">Email</label>
              <input
                class="auth-input"
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="you@example.com"
                value="{{ email }}"
                required
              />
            </div>
            <div class="auth-field">
              <label class="auth-label" for="phone">Phone</label>
              <input
                class="auth-input"
                id="phone"
                name="phone"
                type="tel"
                autocomplete="tel"
                placeholder="01xxxxxxxxx"
                value="{{ phone }}"
                required
              />
            </div>
          </div>

          <div class="auth-grid">
            <div class="auth-field">
              <label class="auth-label" for="signupPassword">Password</label>
              <input
                class="auth-input"
                id="signupPassword"
                name="password"
                type="password"
                autocomplete="new-password"
                placeholder="8+ chars, letter and number"
                minlength="8"
                required
              />
            </div>
            <div class="auth-field">
              <label class="auth-label" for="signupConfirmPassword"
                >Confirm password</label
              >
              <input
                class="auth-input"
                id="signupConfirmPassword"
                name="confirmPassword"
                type="password"
                autocomplete="new-password"
                placeholder="Repeat password"
                required
              />
            </div>
          </div>

          <div class="auth-field">
            <label class="auth-label" for="birthDate">Birth date</label>
            <input
              class="auth-input"
              id="birthDate"
              name="birthDate"
              type="date"
              value="{{ birth_date }}"
              required
            />
          </div>

          <fieldset class="auth-fieldset">
            <legend class="auth-label">Account type</legend>
            <div class="auth-radio-row">
              <label class="auth-radio">
                <input
                  type="radio"
                  name="role"
                  value="user"
                  {%
                  if
                  role
                  !="admin"
                  %}checked{%
                  endif
                  %}
                />
                <span>User</span>
              </label>
              <label class="auth-radio">
                <input
                  type="radio"
                  name="role"
                  value="admin"
                  {%
                  if
                  role=""
                  ="admin"
                  %}checked{%
                  endif
                  %}
                />
                <span>Admin</span>
              </label>
            </div>
          </fieldset>

          <div class="auth-actions auth-actions--signup">
            <button type="submit" class="auth-btn auth-btn-primary">
              Create account
            </button>
            <button type="reset" class="auth-btn auth-btn-secondary">
              Clear
            </button>
            <a
              href="{% url 'login' %}"
              class="auth-btn auth-btn-secondary"
              id="home-button"
            >
              <i class="fa-solid fa-house" aria-hidden="true"></i>
              <span>Home</span>
            </a>
          </div>

          
        </form>

        <p class="auth-footer-text">
          Already have an account? <a href="{% url 'login' %}">Log in</a>
        </p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{% static 'js/index.js' %}"></script>
    {% comment %} <script src="{% static 'js/auth-forms.js' %}"></script> {% endcomment %}
  </body>
</html>
