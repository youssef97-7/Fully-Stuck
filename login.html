<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | Booooooook</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media.css">
</head>
<body id="login-page" class="auth-body">
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
        }
    </script>

    <nav class="auth-nav conteiner">
        <div class="nav-logo">
            <a href="index.html">Booooooook</a>
        </div>
        <div class="auth-nav-actions">
            <a href="signup.html" class="auth-nav-link">Sign up</a>
            <button type="button" id="theme-toggle" aria-label="Toggle theme">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <main class="auth-main">
        <div class="auth-card">
            <div class="auth-card-header">
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Sign in to continue to your library</p>
            </div>

            <form id="loginForm" class="auth-form" novalidate>
                <div class="auth-field">
                    <label class="auth-label" for="email">Email</label>
                    <input class="auth-input" id="email" name="email" type="email" autocomplete="email"
                        placeholder="you@example.com" required>
                </div>
                <div class="auth-field">
                    <label class="auth-label" for="password">Password</label>
                    <input class="auth-input" id="password" name="password" type="password"
                        autocomplete="current-password" placeholder="••••••••" minlength="8" required>
                </div>

                <div class="auth-actions">
                    <button type="submit" class="auth-btn auth-btn-primary">Log in</button>
                    <a href="index.html" class="auth-btn auth-btn-secondary" id="home-button">
                        <i class="fa-solid fa-house" aria-hidden="true"></i>
                        <span>Home</span>
                    </a>
                </div>
            </form>

            <p class="auth-footer-text">
                New here? <a href="signup.html">Create an account</a>
            </p>
        </div>
    </main>

    

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/index.js"></script>
    <script src="js/auth-forms.js"></script>
</body>
</html>
