<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


     <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/media.css">
    <link rel="stylesheet" href="css/style.css">
    


</head>
<body id="login-page">

    <!-- nav bar -->
    <nav>
        Navigation Bar
        <hr>
    </nav>

    <!-- content -->
    <main>
        <button id="theme-toggle">(Light/Dark)</button>
        <section>
            <form method="post">
                <fieldset id="login-form">
                    <legend style="color: blue;" >Login</legend>
                    <table  width="100%" >
                        <button id="home-button" onclick="window.location.href='index.html'">
                        <i class="fa-solid fa-house"></i>
                        </button>
                        <tr>
                            <td><label for="email">Email Address: *</label></td>
                            <td><input id="email" type="email" name="email" required placeholder="ex@gmail.com"> </td>
                        </tr>
                        <tr>
                            <td><label for="password">Password: *</label></td>
                            <td><input id="password" type="password" name="password" required minlength="8"> </td>
                        </tr>
                    </table>
                    <button  type="submit" style="color: white; background-color: dodgerblue;">Submit</button>
                    <button type="reset" style="color: white; background-color: red;">Clear</button>
                    <button type="button" onclick="window.location.href='signup.html'" 
                        style="color: white; background-color: rgb(9, 41, 181);">
                        register
                    </button>   
                </fieldset>
            </form>
        </section>
        <a href="user/user.html" target="_self">Go to User Page</a>
        <a href="admin/admin-dashboard.html" target="_self">Go to Admin Dashboard</a>
    </main>

    <!-- footer -->
    <footer>
        <hr>
        <p>&copy; 2024 Library Management System. All rights reserved.</p>
    </footer>
    
    <script src="js/index.js"></script>

</body>
</html>
